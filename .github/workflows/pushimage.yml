name: Docker image CI for GHCR

on: push

jobs:
  build_and_pushjob:
    runs-on: ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: build and push the image
        run : |
          docker login --username ganeshtunuguntla --password ${{secrets.GH_PAT}} ghcr.io
          docker build . -t ghcr.io/ganeshtunuguntla/packagecheck:latest
          docker push ghcr.io/ganeshtunuguntla/packagecheck:latest
