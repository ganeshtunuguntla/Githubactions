name: Hello world
on: 
  workflow_dispatch:
    inputs:
      Environment:
        description: Choose environment to deploy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod
jobs:
  Hello-job:  #name of job
    runs-on: ubuntu-latest
    steps:
      - name: hello step
        run: |
          echo "Hello world"
          echo "${{inputs.Environment}}"
  outputs-job:
    runs-on: ubuntu-latest
    steps:
      - name: output step
        id : s1
        run : echo "version=1.0.0" >> $GITHUB_OUTPUT
      - name: output step
        id : s2
        run : echo "${{ steps.s1.outputs.version}}"  

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Connecting to env
        env:
            APP_ENV: "test"
        run: echo "$APP_ENV"    
      - uses: actions/checkout@v4
      - run: cat index.html
          
